name: CI - Build, Test, Coverage

on:
  push:
    branches: [ main, feature/*, dev/* ]
  pull_request:
    branches: [ main, feature/* ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build (Debug for UI tests compatibility)
      run: dotnet build --configuration Debug --no-restore

    - name: Run unit tests with coverage
      run: |
        dotnet test CameraCopyTool.Tests/CameraCopyTool.Tests.csproj `
          --configuration Debug `
          --no-build `
          --verbosity normal

    - name: List coverage files
      run: |
        Write-Host "Coverage files found:"
        Get-ChildItem -Recurse -Filter "*.cobertura.xml" -Path ./CameraCopyTool.Tests/coverage | ForEach-Object { Write-Host $_.FullName }
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/TestResults/*.trx'
      
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: coverage-report
        path: 'CameraCopyTool.Tests/coverage/*.cobertura.xml'

    - name: Generate coverage report
      if: success()
      uses: danielpalme/ReportGenerator-GitHub-Action@v5
      with:
        reports: 'CameraCopyTool.Tests/coverage/*.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlSummary;JsonSummary'
        threshold: '80'
        thresholdtype: 'linecoverage'
        failbelowthreshold: true

    # Upload coverage report as artifact for download
    - name: Upload coverage HTML report
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-html-report
        path: coveragereport/
