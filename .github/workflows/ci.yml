name: CI - Build, Test, Coverage

on:
  push:
    branches: [ main, feature/*, dev/* ]
  pull_request:
    branches: [ main, feature/* ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build (Debug for UI tests compatibility)
      run: dotnet build --configuration Debug --no-restore

    - name: Run unit tests with coverage
      run: |
        dotnet test CameraCopyTool.Tests/CameraCopyTool.Tests.csproj `
          --configuration Debug `
          --no-build `
          --verbosity normal `
          --collect:"XPlat Code Coverage" `
          --results-directory ./coverage `
          --logger:"trx" `
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura `
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByAttribute="GeneratedCodeAttribute"

    - name: List coverage files
      run: |
        Write-Host "Coverage files found:"
        Get-ChildItem -Recurse -Filter "*.cobertura.xml" -Path ./coverage | ForEach-Object { Write-Host $_.FullName }
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/TestResults/*.trx'
      
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: coverage-report
        path: '**/coverage/*.cobertura.xml'

    - name: Generate coverage report
      if: success()
      uses: danielpalme/ReportGenerator-GitHub-Action@v5
      with:
        reports: './coverage/**/*.cobertura.xml'
        targetdir: 'coveragereport'
        reporttypes: 'HtmlSummary;JsonSummary'
        threshold: '80'
        thresholdtype: 'linecoverage'
        failbelowthreshold: true

    - name: Publish coverage to GitHub
      if: success()
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: './coverage/**/*.cobertura.xml'
        badge: true
        format: 'markdown'
        output: 'both'

    - name: Add coverage to PR
      if: github.event_name == 'pull_request' && success()
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: './coverage/**/*.cobertura.xml'
        format: 'markdown'
        output: 'comment'
