name: CD - Create Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v2.26.0

jobs:
  release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
      
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      
    - name: Publish CameraCopyTool
      run: dotnet publish CameraCopyTool/CameraCopyTool.csproj --configuration Release --output ./publish/CameraCopyTool --no-build
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./publish/CameraCopyTool/**
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
